services:
  database:
    image: postgres:18.1-alpine
    container_name: postgres_database
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - database-data:/var/lib/postgresql/data

volumes:
  database-data:
