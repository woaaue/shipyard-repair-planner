server:
  port: 8091

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
app:
  security:
    jwt:
      secret: ${JWT_SECRET:change_me_to_a_long_random_secret_key_for_hs256_change_me}

