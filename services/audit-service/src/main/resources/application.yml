server:
  port: 8092

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 1.0
logging:
  pattern:
    correlation: "[%X{traceId:-},%X{spanId:-}] "
