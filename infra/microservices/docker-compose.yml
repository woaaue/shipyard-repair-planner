services:
  postgres:
    image: postgres:18.1-alpine
    container_name: micro_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - micro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.0-alpine
    container_name: micro_redis
    ports:
      - "6379:6379"
    volumes:
      - micro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: micro_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: micro_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: micro_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  notification-service:
    build:
      context: ../../services/notification-service
      dockerfile: Dockerfile
    container_name: micro_notification_service
    ports:
      - "8091:8091"
    depends_on:
      - postgres
      - redis

  audit-service:
    build:
      context: ../../services/audit-service
      dockerfile: Dockerfile
    container_name: micro_audit_service
    ports:
      - "8092:8092"
    depends_on:
      - postgres

  execution-service:
    build:
      context: ../../services/execution-service
      dockerfile: Dockerfile
    container_name: micro_execution_service
    ports:
      - "8093:8093"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka

  repair-planning-service:
    build:
      context: ../../services/repair-planning-service
      dockerfile: Dockerfile
    container_name: micro_repair_planning_service
    ports:
      - "8094:8094"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka

  fleet-service:
    build:
      context: ../../services/fleet-service
      dockerfile: Dockerfile
    container_name: micro_fleet_service
    ports:
      - "8095:8095"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - postgres
      - kafka

  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    container_name: micro_identity_service
    ports:
      - "8096:8096"
    depends_on:
      - postgres

  api-gateway:
    image: nginx:1.29-alpine
    container_name: micro_api_gateway
    ports:
      - "8088:80"
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  micro-postgres-data:
  micro-redis-data:
